<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La llista del súper</title>

<!-- PWA / iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La llista del súper">
<meta name="theme-color" content="#ffffff">

<!-- Icona per iOS (la generem inline com SVG en base64) -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="apple-touch-icon.png">
<link rel="shortcut icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f2;--surface:#fff;--ink:#2e3a2f;--ink-muted:#7a8c7b;--accent:#5a7a5c;--accent-soft:#e8f0e8;--line:#dce6dc;--done-bg:#edf2ed;--done-ink:#a3b5a4;--shadow:0 2px 16px rgba(60,80,60,.08);--r:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:sans-serif;min-height:100vh;display:flex;justify-content:center}
.phone{width:100%;max-width:420px;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

.hdr{background:var(--surface);padding:36px 0 0;position:sticky;top:0;z-index:10}
.hdr-top{display:flex;justify-content:space-between;align-items:center;padding:0 20px 12px}
.hdr h1{font-family:Georgia,serif;font-size:26px;color:var(--ink);line-height:1.1}
.hdr h1 span{display:block;font-size:11px;font-family:sans-serif;font-weight:400;color:var(--ink-muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:2px}
.stat-pending{background:#d4920a;color:#fff;border:none;border-radius:50px;padding:6px 12px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;transition:all .2s;font-family:sans-serif}
.stat-pending.on{background:#a87808;box-shadow:none}
.stat-done{background:#3a6b3c;color:#fff;border:none;border-radius:50px;padding:6px 12px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:sans-serif;transition:all .2s}
.stat-done:hover{background:#2d5230}
.pbar{height:3px;background:var(--line);margin:0 20px 12px;border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
.srow{display:flex;gap:8px;padding:0 20px 10px}
.sinput{flex:1;border:1.5px solid var(--line);background:var(--bg);border-radius:50px;padding:9px 16px;font-size:14px;font-family:sans-serif;color:var(--ink);outline:none;transition:border-color .2s;min-width:0}
.sinput:focus{border-color:var(--accent)}
.sinput::placeholder{color:var(--ink-muted)}
.tbtn{border:1.5px solid var(--line);background:var(--bg);border-radius:50px;padding:9px 14px;font-size:12px;font-family:sans-serif;color:var(--ink-muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.tbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.cats{display:flex;flex-wrap:nowrap;gap:7px;overflow-x:auto;scrollbar-width:none;padding:8px 20px 10px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.cats::-webkit-scrollbar{display:none}
.cbtn{border:1.5px solid var(--line);background:transparent;color:var(--ink-muted);border-radius:50px;padding:6px 14px;font-size:12px;font-family:sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.cbtn.on{background:var(--ink);border-color:var(--ink);color:#fff}

.addbar{display:flex;gap:8px;padding:10px 16px 6px;background:#f0f4f0;position:relative}
.addbar input{flex:1;min-width:0;border:1.5px solid var(--line);background:var(--bg);border-radius:50px;padding:9px 16px;font-size:14px;font-family:sans-serif;color:var(--ink);outline:none;transition:border-color .2s}
.addbar input:focus{border-color:var(--accent)}
.addbar input::placeholder{color:var(--ink-muted)}
.qinput{width:58px!important;flex:none!important;text-align:center;padding:9px 8px!important}
.addbtn{width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;line-height:1}
.addbtn:active{transform:scale(.92)}
.catrow{display:flex;align-items:center;gap:8px;padding:0 16px 12px;background:#f0f4f0;border-bottom:2px solid var(--line)}
.catrow label{font-size:11px;color:var(--ink-muted);flex-shrink:0}
.csel{flex:1;border:1.5px solid var(--line);background:var(--bg);border-radius:50px;padding:7px 14px;font-size:13px;font-family:sans-serif;color:var(--ink);outline:none;cursor:pointer}

#acbox{position:absolute;z-index:99;background:#fff;border:1.5px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.12);left:0;right:0;top:100%;margin:0 0 0 0}
.acitem{padding:11px 16px;font-size:14px;cursor:pointer;color:var(--ink);border-bottom:1px solid var(--line)}
.acitem:last-child{border-bottom:none}
.acitem:hover,.acitem:active{background:var(--accent-soft)}
.accat{opacity:.5;margin-right:8px}
.feedback{font-size:12px;padding:5px 20px 2px;min-height:18px;transition:opacity .3s}
.feedback.warn{color:#b07a30}
.feedback.ok{color:var(--accent)}
.new-product-bar{display:none;align-items:center;gap:8px;padding:10px 16px;background:#f9f0f2;border-top:2px solid #8b1a2e;border-bottom:2px solid #8b1a2e}
.new-product-bar.visible{display:flex;animation:pulseBar .6s ease}
@keyframes pulseBar{0%{opacity:0;transform:scaleY(.7)}60%{opacity:1;transform:scaleY(1.04)}100%{transform:scaleY(1)}}
.new-product-bar span{flex:1;font-size:13px;color:#8b1a2e;font-weight:500}
.new-product-bar span strong{color:#4a3a10}
.np-confirm{padding:8px 16px;background:#8b1a2e;color:#fff;border:none;border-radius:50px;font-family:sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.np-cancel{padding:8px 12px;background:transparent;color:var(--ink-muted);border:1.5px solid var(--line);border-radius:50px;font-family:sans-serif;font-size:13px;cursor:pointer;white-space:nowrap}

.lista{flex:1;overflow-y:auto;padding:8px 16px 100px}
.glabel{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-muted);font-weight:500;padding:14px 4px 6px}
.item{display:flex;align-items:center;gap:11px;background:var(--surface);border-radius:var(--r);padding:12px 14px;margin-bottom:6px;box-shadow:var(--shadow);cursor:pointer;animation:si .2s ease}
.item:active{transform:scale(.98)}
.item.done{background:var(--done-bg);box-shadow:none}
.chk{width:23px;height:23px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s;background:#fff}
.item.done .chk{background:var(--accent);border-color:var(--accent)}
.cm{width:11px;height:8px;opacity:0;transition:opacity .2s}
.item.done .cm{opacity:1}
.iinfo{flex:1;min-width:0}
.iname{font-size:14px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .3s}
.item.done .iname{color:var(--done-ink);text-decoration:line-through}
.imeta{font-size:11px;color:var(--ink-muted);margin-top:1px}
.item.done .imeta{color:var(--done-ink)}
.iqty-edit{width:54px;border:1.5px solid transparent;background:var(--accent-soft);border-radius:8px;padding:4px 8px;font-size:12px;font-weight:600;color:var(--accent);text-align:center;flex-shrink:0;font-family:sans-serif;outline:none;cursor:pointer;transition:all .2s}
.iqty-edit:focus{border-color:var(--accent);background:#fff}
.iqty-edit::placeholder{color:var(--line);font-weight:400}
.item.done .iqty-edit{color:var(--done-ink);background:var(--done-bg);border-color:transparent}
.editcatbtn{background:var(--accent-soft);border:1.5px solid var(--line);border-radius:50px;color:var(--accent);font-size:13px;cursor:pointer;padding:4px 10px;line-height:1;flex-shrink:0;font-family:sans-serif;font-weight:500;transition:all .2s}
.editcatbtn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.delbtn{background:none;border:none;color:var(--line);font-size:17px;cursor:pointer;padding:2px 4px;line-height:1;transition:color .2s;flex-shrink:0}
.delbtn:hover{color:var(--accent)}

.bbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--surface);border-top:1px solid var(--line);padding:10px 16px 26px;display:flex;gap:8px}
.b1{flex:1.4;padding:12px 8px;border:none;background:var(--accent);border-radius:50px;font-family:sans-serif;font-size:13px;font-weight:600;color:#fff;cursor:pointer;transition:background .2s}
.b1:active{background:var(--ink)}
.b2,.b3{flex:1;padding:12px 4px;border:1.5px solid var(--line);background:transparent;border-radius:50px;font-family:sans-serif;font-size:11px;color:var(--ink-muted);cursor:pointer}

.empty{text-align:center;padding:50px 20px;color:var(--ink-muted)}
.empty .ico{font-size:44px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px;line-height:1.6;margin-bottom:18px}
.empty-open{background:var(--accent);color:#fff;border:none;border-radius:50px;padding:13px 28px;font-family:sans-serif;font-size:15px;font-weight:600;cursor:pointer}

.overlay{position:fixed;inset:0;background:rgba(46,58,47,.45);z-index:30;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.on{opacity:1;pointer-events:all}
.panel{position:fixed;bottom:0;left:0;right:0;max-width:420px;margin:0 auto;background:var(--surface);border-radius:24px 24px 0 0;z-index:31;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:88vh;display:flex;flex-direction:column}
.panel.on{transform:translateY(0)}
.pnl-hdr{padding:18px 20px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
.handle{width:36px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 14px}
.pnl-hdr h2{font-family:Georgia,serif;font-size:20px;color:var(--ink);margin-bottom:10px}
.pnl-cats{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.pnl-cats::-webkit-scrollbar{display:none}
.pcbtn{border:1.5px solid var(--line);background:transparent;color:var(--ink-muted);border-radius:50px;padding:6px 13px;font-size:12px;font-family:sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.pcbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.pnl-body{overflow-y:auto;padding:8px 16px 12px;flex:1}
.pi{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;cursor:pointer;transition:background .15s;margin-bottom:3px;user-select:none}
.pi:hover{background:var(--bg)}
.pi.sel{background:var(--accent-soft)}
.pi.used{opacity:.3;pointer-events:none}
.pichk{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .2s}
.pi.sel .pichk{background:var(--accent);border-color:var(--accent)}
.picm{width:10px;height:7px;opacity:0;transition:opacity .15s}
.pi.sel .picm{opacity:1}
.pi-del-btn{background:none;border:none;color:#c9b8b8;font-size:14px;cursor:pointer;padding:2px 6px;flex-shrink:0;line-height:1;transition:color .2s}
.pi-del-btn:hover,.pi-del-btn:active{color:#8b1a2e}
.piname{flex:1;font-size:14px;color:var(--ink);line-height:1.3}
.pi.sel .piname{font-weight:500;color:var(--accent)}
.piqty{width:60px;border:1.5px solid var(--line);background:#fff;border-radius:50px;padding:6px 8px;font-size:12px;font-family:sans-serif;color:var(--ink);outline:none;text-align:center;flex-shrink:0;transition:all .2s;color:var(--ink-muted)}
.pi.sel .piqty{border-color:var(--accent);color:var(--ink);background:var(--accent-soft)}
.pnl-ftr{padding:12px 16px 28px;border-top:1px solid var(--line);flex-shrink:0;display:flex;gap:8px}
.pcancel{flex:1;padding:12px;border:1.5px solid var(--line);background:transparent;border-radius:50px;font-family:sans-serif;font-size:14px;color:var(--ink-muted);cursor:pointer}
.pconfirm{flex:2;padding:12px;border:none;background:var(--accent);border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:background .2s}
.pconfirm:active{background:var(--ink)}

@keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.edit-overlay{position:fixed;inset:0;z-index:40;background:rgba(46,58,47,.35)}
.edit-menu{position:fixed;z-index:41;background:var(--surface);border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:16px;width:280px;animation:fadeIn .18s ease}
.edit-menu h3{font-family:Georgia,serif;font-size:15px;color:var(--ink);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.edit-menu h3 span{display:block;font-family:sans-serif;font-size:11px;color:var(--ink-muted);font-weight:400;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.ecat-grid{display:flex;flex-wrap:wrap;gap:6px}
.ecat-btn{border:1.5px solid var(--line);background:transparent;color:var(--ink-muted);border-radius:50px;padding:6px 12px;font-size:12px;font-family:sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s}
.ecat-btn:hover,.ecat-btn:active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.ecat-btn.current{background:var(--accent);border-color:var(--accent);color:#fff}
.edit-cancel{margin-top:12px;width:100%;padding:10px;border:1.5px solid var(--line);background:transparent;border-radius:50px;font-family:sans-serif;font-size:13px;color:var(--ink-muted);cursor:pointer}
</style>
</head>
<body>
<div class="phone">

  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div style="font-size:18px;color:#2e3a2f;line-height:1.2;margin-bottom:3px">
          <span style="font-family:Georgia,serif;font-style:italic;font-weight:400">La llista </span><span style="font-family:sans-serif;font-weight:700">del súper</span>
        </div>
        <p id="dataAvui" style="font-size:11px;color:#7a8c7b;margin:0"></p>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="stat-pending" id="badge" onclick="togglePending()">0 per comprar</button>
        <button class="stat-done" id="badgeDone" onclick="showListSummary()">0 comprats</button>
      </div>
    </div>
    <div class="pbar"><div class="pbar-fill" id="pbar"></div></div>
    <div class="srow">
      <input class="sinput" id="search" placeholder="🔍  Cerca o afegeix un producte…" oninput="render();showAC()" autocomplete="off" onkeydown="if(event.key==='Escape')hideAC()">
    </div>
    <div style="position:relative;display:flex;align-items:center;gap:6px">
    <div id="catsPrev" style="flex-shrink:0;background:#5a7a5c;border-radius:50px;padding:6px 10px;margin-left:14px;cursor:pointer;display:none;align-items:center" onclick="document.getElementById('cats').scrollBy({left:-180,behavior:'smooth'})">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 8H4M8 4L4 8l4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="cats" id="cats" style="flex:1;min-width:0" onscroll="updateCatsArrows()"></div>
    <div id="catsNext" style="flex-shrink:0;background:#5a7a5c;border-radius:50px;padding:6px 10px;margin-right:14px;cursor:pointer;display:flex;align-items:center" onclick="document.getElementById('cats').scrollBy({left:180,behavior:'smooth'})">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8h8M8 4l4 4-4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
  </div>

  <div style="display:flex;align-items:center;gap:10px;padding:14px 20px 8px;background:var(--surface)">
    <div style="flex:1;height:1px;background:var(--line)"></div>
    <span style="font-size:12px;color:#8b1a2e;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;font-weight:700">✏️  Producte nou</span>
    <div style="flex:1;height:1px;background:var(--line)"></div>
  </div>
  <div class="addbar">
    <input type="text" id="nameIn" placeholder="Escriu el producte a afegir…" onkeydown="if(event.key==='Enter')addItem()" autocomplete="off">
    <input type="text" id="qtyIn" class="qinput" placeholder="Qtat" onkeydown="if(event.key==='Enter')addItem()">
    <button class="addbtn" onclick="addItem()">+</button>
  </div>
  <div class="catrow">
    <label>Categoria</label>
    <select class="csel" id="catIn">
      <option value="🥦 Verdures">🥦 Verdures</option>
      <option value="🍎 Fruita">🍎 Fruita</option>
      <option value="🧀 Formatges">🧀 Formatges</option>
      <option value="🥛 Lactis">🥛 Lactis</option>
      <option value="🥚 Ous">🥚 Ous</option>
      <option value="🥩 Carn">🥩 Carn</option>
      <option value="🥓 Embotits">🥓 Embotits</option>
      <option value="🐟 Peix">🐟 Peix</option>
      <option value="🧊 Refrigerats">🧊 Refrigerats</option>
      <option value="🥣 Brous">🥣 Brous</option>
      <option value="🫘 Llegums">🫘 Llegums</option>
      <option value="🥫 Conserves">🥫 Conserves</option>
      <option value="🍝 Pasta">🍝 Pasta</option>
      <option value="🍚 Arrossos">🍚 Arrossos</option>
      <option value="🌾 Farines">🌾 Farines</option>
      <option value="🫙 Fruits secs i deshidratats">🫙 Fruits secs i deshidratats</option>
      <option value="🍞 Pa i forn">🍞 Pa i forn</option>
      <option value="🥐 Esmorzar">🥐 Esmorzar</option>
      <option value="☕ Cafè i infusions">☕ Cafè i infusions</option>
      <option value="🌰 Fruits secs">🌰 Fruits secs</option>
      <option value="🫒 Pica-pica">🫒 Pica-pica</option>
      <option value="🥤 Begudes">🥤 Begudes</option>
      <option value="🍷 Vins">🍷 Vins</option>
      <option value="❄️ Congelats">❄️ Congelats</option>
      <option value="🍦 Gelats">🍦 Gelats</option>
      <option value="🌿 Vegan">🌿 Vegan</option>
      <option value="🐾 Nut">🐾 Nut</option>
      <option value="🧴 Higiene">🧴 Higiene</option>
      <option value="🧹 Neteja">🧹 Neteja</option>
    </select>
  </div>

  <div class="feedback" id="feedback"></div>
  <div class="new-product-bar" id="newProductBar">
    <span id="newProductMsg"></span>
    <button class="np-cancel" onclick="cancelNewProduct()">Cancel·lar</button>
    <button class="np-confirm" onclick="confirmNewProduct()">Incorporar</button>
  </div>
  <div class="lista" id="lista"></div>

  <div class="bbar">
    <button class="b1" onclick="openPanel()">＋ Afegir productes</button>
    <button class="b2" onclick="clearDone()" title="Elimina els productes ja comprats de la llista">Nova compra</button>
    <button class="b3" onclick="clearAll()">Esborra tot</button>
  </div>

  <div class="overlay" id="overlay" onclick="closePanel()"></div>
  <div class="panel" id="panel">
    <div class="pnl-hdr">
      <div class="handle"></div>
      <h2>Afegir a la llista</h2>
      <div class="pnl-cats" id="pnlCats"></div>
      <div style="margin-top:8px;display:flex;gap:6px">
        <button onclick="openNewCatForm()" style="background:none;border:1.5px dashed var(--line);border-radius:50px;padding:5px 14px;font-size:12px;color:var(--ink-muted);cursor:pointer;font-family:sans-serif">＋ Nova</button>
        <button onclick="openManageCats()" style="background:none;border:1.5px solid var(--line);border-radius:50px;padding:5px 14px;font-size:12px;color:var(--ink-muted);cursor:pointer;font-family:sans-serif">⚙️ Gestionar</button>
      </div>
    </div>
    <div class="pnl-body" id="pnlBody"></div>
    <div class="pnl-ftr">
      <button class="pcancel" onclick="closePanel()">Cancel·lar</button>
      <button class="pconfirm" id="pconfirm" onclick="confirmPanel()">Afegir seleccionats</button>
    </div>
  </div>

</div>
<script>
let CATALOG = [
  // 🍎 Fruita
  {name:"Banana en manat 800 g", cat:"🍎 Fruita"},
  {name:"Pera Conference Km0", cat:"🍎 Fruita"},
  {name:"Pera Blanquilla Km0", cat:"🍎 Fruita"},
  {name:"Poma Granny Km0", cat:"🍎 Fruita"},
  {name:"Poma Golden Km0", cat:"🍎 Fruita"},
  {name:"Kiwi verd", cat:"🍎 Fruita"},
  {name:"Albercocs Km0 en safata de 600 g", cat:"🍎 Fruita"},

// ── RESUM DE LA LLISTA ────────────────────────────────────────────────────────
function showListSummary(){
  if(!items.length){ showFeedback('La llista és buida', 'warn'); return; }

  // Crear overlay + modal
  const ov = document.createElement('div');
  ov.className = 'edit-overlay';
  ov.onclick = () => ov.remove();

  const modal = document.createElement('div');
  modal.className = 'edit-menu';
  modal.style.cssText = 'left:50%;top:50%;transform:translate(-50%,-50%);width:320px;max-height:70vh;overflow-y:auto';
  modal.onclick = e => e.stopPropagation();

  const pending = items.filter(i => !i.done);
  const done = items.filter(i => i.done);

  // Agrupar TOTS els items per categoria (pendents + comprats)
  const groups = {};
  items.forEach(i => {
    if(!groups[i.cat]) groups[i.cat] = [];
    groups[i.cat].push(i);
  });

  const catKeys = Object.keys(groups).sort((a,b) =>
    CAT_ORDER.indexOf(a) - CAT_ORDER.indexOf(b)
  );

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h3 style="font-family:Georgia,serif;font-size:17px;color:var(--ink)">La llista</h3>
    <span style="font-size:12px;color:var(--ink-muted)">${pending.length} per comprar · ${done.length} comprats</span>
  </div>`;

  if(!items.length){
    html += `<p style="text-align:center;color:var(--accent);padding:16px;font-weight:500">La llista és buida</p>`;
  } else {
    catKeys.forEach(cat => {
      html += `<div style="margin-bottom:10px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-muted);font-weight:500;padding:4px 0 4px">${cat}</div>`;
      groups[cat].forEach(item => {
        html += `<div onclick="toggleFromModal(${item.id})" style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;color:var(--ink);cursor:pointer;gap:10px">
          <span style="display:flex;align-items:center;gap:8px;flex:1">
            <span style="width:20px;height:20px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:${item.done?'var(--accent)':'#fff'};border-color:${item.done?'var(--accent)':'var(--line)'}">
              ${item.done?'<svg width="10" height="7" viewBox="0 0 10 7" fill="none"><path d="M1 3.5L3.5 6L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
            </span>
            <span style="${item.done?'text-decoration:line-through;color:var(--done-ink)':''}">${item.name}</span>
          </span>
          <span style="color:var(--accent);font-weight:600;flex-shrink:0">${item.qty||''}</span>
        </div>`;
      });
      html += `</div>`;
    });
  }

  html += `<button onclick="document.querySelector('.edit-overlay').remove()"
    style="margin-top:12px;width:100%;padding:11px;border:1.5px solid var(--line);background:transparent;border-radius:50px;font-family:sans-serif;font-size:14px;color:var(--ink-muted);cursor:pointer">
    Tancar</button>`;

  modal.innerHTML = html;
  ov.appendChild(modal);
  document.querySelector('.phone').appendChild(ov);
}

function toggleFromModal(id){
  const item = items.find(x => x.id===id);
  if(!item) return;
  item.done = !item.done;
  save(); render();
  // Re-renderitzar el modal
  const ov = document.querySelector('.edit-overlay');
  if(ov){ ov.remove(); showListSummary(); }
}

function updateCatsArrows(){
  const el = document.getElementById('cats');
  const prev = document.getElementById('catsPrev');
  const next = document.getElementById('catsNext');
  if(!el||!prev||!next) return;
  prev.style.display = el.scrollLeft > 10 ? 'flex' : 'none';
  next.style.display = el.scrollLeft < (el.scrollWidth - el.clientWidth - 10) ? 'flex' : 'none';
}

function buildCats(){
  const el = document.getElementById('cats');
  el.innerHTML = ['tots',...CAT_ORDER].map(c =>
    `<button class="cbtn${c===filter?' on':''}"
      onclick="setFilter(this,'${c.replace(/'/g,"\'")}')">
      ${c==='tots'?'Tot el catàleg':c}</button>`
  ).join('');
}

function setFilter(btn, c){
  filter = c;
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
  setTimeout(updateCatsArrows, 50);
  // Qualsevol categoria (inclòs "tots") obre el panell
  pSel.clear();
  pQty.clear();
  // Si "tots": obrir panell a la primera categoria
  pCat = (c === 'tots') ? CAT_ORDER[0] : c;
  renderPanelCats();
  renderPanelItems();
  document.getElementById('panel').classList.add('on');
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function render(){
  const el = document.getElementById('lista');
  const q = document.getElementById('search').value.trim().toLowerCase();
  let vis = [...items];
  if(filter !== 'tots') vis = vis.filter(i => i.cat === filter);
  if(onlyPending) vis = vis.filter(i => !i.done);
  if(q) vis = vis.filter(i => i.name.toLowerCase().includes(q) || i.cat.toLowerCase().includes(q));

  if(!vis.length){
    el.innerHTML = `<div class="empty">
      <div class="ico">🛒</div>
      <p>${items.length===0 ? 'La llista és buida.' : 'Cap resultat.'}</p>
      ${items.length===0 ? '<button class="empty-open" onclick="openPanel()">＋ Afegir productes</button>' : ''}
    </div>`;
    updateBadge(); return;
  }

  const groups = {};
  vis.forEach(i => { if(!groups[i.cat]) groups[i.cat]=[]; groups[i.cat].push(i); });
  const keys = Object.keys(groups).sort((a,b) => CAT_ORDER.indexOf(a)-CAT_ORDER.indexOf(b));

  el.innerHTML = keys.map(cat => `
    <div class="glabel">${cat}</div>
    ${groups[cat].sort((a,b)=>a.done-b.done).map(item => `
      <div class="item${item.done?' done':''}" onclick="toggle(${item.id})" oncontextmenu="event.preventDefault();editCat(${item.id},event)" ontouchstart="startLong(${item.id},event)" ontouchend="cancelLong()" ontouchmove="cancelLong()">
        <div class="chk">
          <svg class="cm" viewBox="0 0 11 8" fill="none">
            <path d="M1 3.5L4 6.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="iinfo">
          <div class="iname">${item.name}</div>
          <div class="imeta">${item.cat}</div>
        </div>
        <input class="iqty-edit" type="text" placeholder="Qtat"
          value="${item.qty||''}"
          onclick="event.stopPropagation()"
          onchange="event.stopPropagation();updateQty(${item.id},this.value)"
          title="Editar quantitat">
        <button class="editcatbtn" onclick="event.stopPropagation();editItem(${item.id})" title="Editar producte">✏️</button>
        <button class="delbtn" onclick="event.stopPropagation();del(${item.id})">×</button>
      </div>`).join('')}
  `).join('');
  updateBadge();
}

function updateBadge(){
  const p = items.filter(i=>!i.done).length;
  const d = items.filter(i=>i.done).length;
  const t = items.length;
  const pendBtn = document.getElementById('badge');
  const doneBtn = document.getElementById('badgeDone');
  if(pendBtn) pendBtn.textContent = p===0&&t>0 ? '✓ Tot comprat!' : p+' per comprar';
  if(doneBtn) doneBtn.textContent = d+' comprat'+(d!==1?'s':'');
  document.getElementById('pbar').style.width = t>0 ? ((t-p)/t*100)+'%' : '0%';
}

function toggle(id){ const i=items.find(x=>x.id===id); if(i){i.done=!i.done;save();render();} }
function del(id){ items=items.filter(x=>x.id!==id);save();render(); }
function updateQty(id, val){
  const item = items.find(x=>x.id===id);
  if(item){ item.qty = val.trim(); save(); }
}

function togglePending(){
  onlyPending=!onlyPending;
  document.getElementById('badge').classList.toggle('on',onlyPending);
  // Resetejar filtre de categoria a "tots" per veure tota la llista pendent
  if(onlyPending){
    filter = 'tots';
    document.querySelectorAll('.cbtn').forEach(b => b.classList.toggle('on', b.textContent.trim()==='Tots'));
  }
  render();
  // Fer scroll fins al primer item de la llista
  if(onlyPending){
    setTimeout(() => {
      const lista = document.getElementById('lista');
      const firstItem = lista.querySelector('.item');
      if(firstItem) firstItem.scrollIntoView({behavior:'smooth', block:'start'});
      else lista.scrollIntoView({behavior:'smooth'});
    }, 80);
  }
}

// AUTOCOMPLETE
const nameIn = document.getElementById('nameIn');
nameIn.addEventListener('keydown', e=>{ if(e.key==='Escape') hideAC(); });
document.addEventListener('click', e=>{ if(!e.target.closest('.addbar') && !e.target.closest('.srow')) hideAC(); });

function showAC(){
  hideAC();
  const q = searchIn.value.trim().toLowerCase();
  if(q.length < 2) return;

  const inListSet = new Set(items.map(i => i.name.toLowerCase()));
  const hits = CATALOG.filter(c => c.name.toLowerCase().includes(q)).slice(0, 8);

  // Si no hi ha cap hit al catàleg → deixar text al cercador + mostrar llegenda
  if(!hits.length){
    const name = searchIn.value.trim();
    nameIn.value = name;
    pendingNewProduct = { name, qty: '', cat: document.getElementById('catIn').value };
    document.getElementById('newProductMsg').innerHTML =
      '🆕 No tenim <strong>"' + name + '"</strong> al nostre llistat. L\'incorporem?';
    document.getElementById('newProductBar').classList.add('visible');
    return;
  }

  // Hi ha hits → mostrar suggerències
  const box = document.createElement('div');
  box.id = 'acbox';

  hits.forEach(m => {
    const alreadyInList = inListSet.has(m.name.toLowerCase());
    const d = document.createElement('div');
    d.className = 'acitem';

    if(alreadyInList){
      // Ja a la llista → avís, no clicable
      d.innerHTML = `<span class="accat">${m.cat.split(' ')[0]}</span>${m.name}<span style="font-size:11px;color:var(--accent);margin-left:6px;font-weight:500">· ja a la llista</span>`;
      d.style.cssText = 'opacity:.5;cursor:default;pointer-events:none';
    } else {
      // Al catàleg, no a la llista → marcar categoria en verd + obrir panell
      d.innerHTML = `<span class="accat">${m.cat.split(' ')[0]}</span>${m.name}<span style="font-size:11px;color:var(--ink-muted);margin-left:6px">· ${m.cat.replace(/^\S+\s/,'')}</span>`;
      d.onmousedown = e => {
        e.preventDefault();
        hideAC();
        searchIn.value = '';
        // Marcar categoria en verd al filtre superior
        filter = m.cat;
        document.querySelectorAll('.cbtn').forEach(b =>
          b.classList.toggle('on', b.textContent.trim() === m.cat)
        );
        render();
        // Obrir panell a la categoria
        pSel.clear(); pQty.clear();
        pCat = m.cat;
        renderPanelCats();
        renderPanelItems();
        document.getElementById('panel').classList.add('on');
        document.getElementById('overlay').classList.add('on');
        document.body.style.overflow = 'hidden';
      };
    }
    box.appendChild(d);
  });

  // Afegir opció "No és al catàleg" al final si el text no coincideix exactament
  const exactMatch = hits.some(h => h.name.toLowerCase() === q);
  if(!exactMatch){
    const d = document.createElement('div');
    d.className = 'acitem';
    d.innerHTML = `<span style="opacity:.5;margin-right:8px">🆕</span>Afegir "<strong>${searchIn.value.trim()}</strong>" com a producte nou`;
    d.style.cssText = 'border-top:1px solid var(--line);color:var(--ink-muted);font-style:italic';
    d.onmousedown = e => {
      e.preventDefault();
      hideAC();
      const name = searchIn.value.trim();
      nameIn.value = name;
      pendingNewProduct = { name, qty: '', cat: document.getElementById('catIn').value };
      document.getElementById('newProductMsg').innerHTML =
        '🆕 No tenim <strong>"' + name + '"</strong> al nostre llistat. L\'incorporem?';
      document.getElementById('newProductBar').classList.add('visible');;
    };
    box.appendChild(d);
  }

  document.querySelector('.srow').style.position = 'relative';
  document.querySelector('.srow').appendChild(box);
}

// ── ADD ITEM (camp manual, per productes nous no al catàleg) ──────────────────
function addItem(){
  const name = nameIn.value.trim();
  if(!name) return;

  // Ja és a la llista?
  const existing = items.find(i => i.name.toLowerCase() === name.toLowerCase());
  if(existing){
    showFeedback('⚠️  "' + existing.name + '" ja és a la llista (' + existing.cat + ')', 'warn');
    nameIn.select();
    document.getElementById('newProductBar').classList.remove('visible');
    return;
  }

  // És al catàleg? → redirigir via cerca
  const inCatalog = CATALOG.find(c => c.name.toLowerCase() === name.toLowerCase());
  if(inCatalog){
    hideAC();
    nameIn.value = '';
    filter = inCatalog.cat;
    document.querySelectorAll('.cbtn').forEach(b =>
      b.classList.toggle('on', b.textContent.trim() === inCatalog.cat)
    );
    render();
    pSel.clear(); pQty.clear();
    pCat = inCatalog.cat;
    renderPanelCats(); renderPanelItems();
    document.getElementById('panel').classList.add('on');
    document.getElementById('overlay').classList.add('on');
    document.body.style.overflow = 'hidden';
    document.getElementById('newProductBar').classList.remove('visible');
    return;
  }

  // Producte nou → mostrar barra confirmació si no estava visible
  if(!pendingNewProduct){
    pendingNewProduct = { name, qty: document.getElementById('qtyIn').value.trim(), cat: document.getElementById('catIn').value };
    document.getElementById('newProductMsg').innerHTML =
      '🆕 <strong>"' + name + '"</strong> no és al catàleg. Tria categoria i incorpora\'l.';
    document.getElementById('newProductBar').classList.add('visible');
  }
}

let pendingNewProduct = null;

function confirmNewProduct(){
  if(!pendingNewProduct) return;
  pendingNewProduct.cat = document.getElementById('catIn').value;
  pendingNewProduct.qty = document.getElementById('qtyIn').value.trim();
  pendingNewProduct.name = nameIn.value.trim() || pendingNewProduct.name;

}

let currentCatItems = [];
function renderPanelItems(){
  const inList = new Set(items.map(i => i.name.toLowerCase()));
  currentCatItems = CATALOG.filter(c => c.cat === pCat);
  if(!currentCatItems.length){
    document.getElementById('pnlBody').innerHTML = '<p style="text-align:center;color:var(--ink-muted);padding:30px;font-size:14px">Cap producte en aquesta categoria</p>';
    updatePConfirm(); return;
  }
  document.getElementById('pnlBody').innerHTML = currentCatItems.map((item,idx) => {
    const sel = pSel.has(item.name);
    const used = inList.has(item.name.toLowerCase());
    return `<div class="pi${sel?' sel':''}${used?' used':''}" onclick="togglePI(${idx},this)">
      <div class="pichk">
        <svg class="picm" viewBox="0 0 10 7" fill="none">
          <path d="M1 3.5L3.5 6L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="piname">${item.name}${used?' <span style="opacity:.45;font-size:11px"> · ja a la llista</span>':''}</span>
      <input class="piqty" type="text" placeholder="Qtat"
        onclick="event.stopPropagation()"
        oninput="event.stopPropagation();pQty.set('${item.name.replace(/'/g,"\\'")}', this.value)"
        data-name="${item.name.replace(/"/g,'&quot;')}"
        value="${pQty.get(item.name)||''}">
      <button class="pi-del-btn" onclick="event.stopPropagation();delFromCatalog(${idx},this)" title="Eliminar del catàleg">✕</button>
    </div>`;
  }).join('');
  updatePConfirm();
}

function togglePI(idx, el){
  const name = currentCatItems[idx].name;
  if(pSel.has(name)){
    pSel.delete(name);
    pQty.delete(name);
    el.classList.remove('sel');
  } else {
    pSel.add(name);
    el.classList.add('sel');
    const qin = el.querySelector('.piqty');
    if(qin) setTimeout(()=>qin.focus(),50);
  }
  updatePConfirm();
}

// Eliminar article del catàleg
const CATALOG_KEY = 'catalog_deleted_v4';
function getDeletedCatalog(){
  return new Set(JSON.parse(localStorage.getItem(CATALOG_KEY) || '[]'));
}
function delFromCatalog(idx, btn){
  const item = currentCatItems[idx];
  if(!item) return;
  if(!confirm('Eliminar "' + item.name + '" del catàleg?')) return;
  // Marcar com eliminat
  const deleted = getDeletedCatalog();
  deleted.add(item.name);
  localStorage.setItem(CATALOG_KEY, JSON.stringify([...deleted]));
  // Treure de CATALOG en memòria
  const catalogIdx = CATALOG.findIndex(c => c.name === item.name);
  if(catalogIdx >= 0) CATALOG.splice(catalogIdx, 1);
  // Si estava seleccionat, treure'l
  pSel.delete(item.name);
  pQty.delete(item.name);
  renderPanelItems();
  showFeedback('"' + item.name + '" eliminat del catàleg', 'ok');
}

// Aplicar eliminacions guardades en carregar
function applyDeletedCatalog(){
  const deleted = getDeletedCatalog();
  if(!deleted.size) return;
  for(let i = CATALOG.length - 1; i >= 0; i--){
    if(deleted.has(CATALOG[i].name)) CATALOG.splice(i, 1);
  }
}
function updatePConfirm(){
  const n = pSel.size;
  document.getElementById('pconfirm').textContent = n>0 ? `Afegir productes (${n})` : 'Selecciona productes';
}
function confirmPanel(){
  if(!pSel.size) return;
  // Recollir quantitats dels inputs visibles
  document.querySelectorAll('.piqty').forEach(inp => {
    const n = inp.dataset.name;
    const v = inp.value.trim();
    if(v) pQty.set(n, v);
  });
  pSel.forEach(name => {
    if(!items.some(i => i.name.toLowerCase()===name.toLowerCase())){
      const c = CATALOG.find(x => x.name===name);
      items.unshift({id:Date.now()+Math.random(), name, qty:pQty.get(name)||'1', cat:c?c.cat:'🥫 Envasats', done:false});
    }
  });
  save(); render(); closePanel();
}

function doRename(cat, redrawFn){
  // Modal inline sense prompt() — compatible amb iframes
  const currentEmoji = cat.match(/^\S+/)?.[0] || '';
  const currentName  = cat.replace(/^\S+\s*/, '');

  // Crear sub-modal sobre el modal de gestió
  const subOv = document.createElement('div');
  subOv.style.cssText = 'position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(46,58,47,.5)';
  subOv.onclick = e => { if(e.target===subOv) subOv.remove(); };

  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:18px;padding:20px;width:290px;box-shadow:0 8px 32px rgba(0,0,0,.2)';
  box.onclick = e => e.stopPropagation();
  box.innerHTML =
    '<h3 style="font-family:Georgia,serif;font-size:15px;color:#2e3a2f;margin-bottom:14px">Editar categoria</h3>'
    + '<div style="margin-bottom:10px">'
    + '<label style="font-size:11px;color:#7a8c7b;text-transform:uppercase;letter-spacing:.5px">Emoji</label>'
    + '<input id="editEmoji" type="text" maxlength="4" value="' + currentEmoji + '"'
    + ' style="width:100%;margin-top:4px;border:1.5px solid #dce6dc;border-radius:50px;padding:8px 14px;font-size:20px;font-family:sans-serif;outline:none;text-align:center;box-sizing:border-box">'
    + '</div>'
    + '<div style="margin-bottom:16px">'
    + '<label style="font-size:11px;color:#7a8c7b;text-transform:uppercase;letter-spacing:.5px">Nom</label>'
    + '<input id="editName" type="text" value="' + currentName + '"'
    + ' style="width:100%;margin-top:4px;border:1.5px solid #dce6dc;border-radius:50px;padding:8px 14px;font-size:14px;font-family:sans-serif;outline:none;box-sizing:border-box">'
    + '</div>'
    + '<div style="display:flex;gap:8px">'
    + '<button id="editCancel" style="flex:1;padding:10px;border:1.5px solid #dce6dc;background:transparent;border-radius:50px;font-family:sans-serif;font-size:13px;color:#7a8c7b;cursor:pointer">Cancel·lar</button>'
    + '<button id="editConfirm" style="flex:2;padding:10px;border:none;background:#5a7a5c;border-radius:50px;font-family:sans-serif;font-size:13px;font-weight:600;color:#fff;cursor:pointer">Desar</button>'
    + '</div>';

  subOv.appendChild(box);
  document.querySelector('.phone').appendChild(subOv);
  document.getElementById('editName').focus();
  document.getElementById('editName').select();

  document.getElementById('editCancel').onclick = () => subOv.remove();

  document.getElementById('editConfirm').onclick = () => {
    const newEmoji = document.getElementById('editEmoji').value.trim() || currentEmoji;
    const newName  = document.getElementById('editName').value.trim();
    if(!newName){ document.getElementById('editName').focus(); return; }
    const fullNew = newEmoji + ' ' + newName;
    if(fullNew !== cat){
      const idx = CAT_ORDER.indexOf(cat);
      if(idx >= 0) CAT_ORDER[idx] = fullNew;
      CATALOG.forEach(c => { if(c.cat === cat) c.cat = fullNew; });
      items.forEach(it => { if(it.cat === cat) it.cat = fullNew; });
      save();
      const custom = JSON.parse(localStorage.getItem('custom_cats_v4') || '[]');
      const fi = custom.indexOf(cat);
      if(fi >= 0) custom[fi] = fullNew; else custom.push(fullNew);
      localStorage.setItem('custom_cats_v4', JSON.stringify(custom));
      buildCats(); render();
      showFeedback('✓ Reanomenada a "' + fullNew + '"', 'ok');
    }
    subOv.remove();
    if(redrawFn) redrawFn();
  };

  // Enter confirma
  document.getElementById('editName').onkeydown = e => {
    if(e.key === 'Enter') document.getElementById('editConfirm').click();

  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:18px;padding:20px;width:280px;box-shadow:0 8px 32px rgba(0,0,0,.2)';

    + '<p style="font-size:13px;color:#7a8c7b;line-height:1.5;margin-bottom:16px"><strong style="color:#2e3a2f">' + cat + '</strong><br>' + msg + '</p>'
    + '<div style="display:flex;gap:8px">'
    + '<button id="delCancel" style="flex:1;padding:10px;border:1.5px solid #dce6dc;background:transparent;border-radius:50px;font-family:sans-serif;font-size:13px;color:#7a8c7b;cursor:pointer">Cancel·lar</button>'
    + '<button id="delConfirm" style="flex:2;padding:10px;border:none;background:#8b1a2e;border-radius:50px;font-family:sans-serif;font-size:13px;font-weight:600;color:#fff;cursor:pointer">Eliminar</button>'
    + '</div>';

  subOv.appendChild(box);
  document.querySelector('.phone').appendChild(subOv);

  document.getElementById('delCancel').onclick = () => subOv.remove();
  document.getElementById('delConfirm').onclick = () => {
    const idx = CAT_ORDER.indexOf(cat);
    if(idx >= 0) CAT_ORDER.splice(idx, 1);
    items.forEach(i => { if(i.cat === cat && CAT_ORDER.length) i.cat = CAT_ORDER[0]; });
    save();
    const custom = JSON.parse(localStorage.getItem('custom_cats_v4') || '[]');
    localStorage.setItem('custom_cats_v4', JSON.stringify(custom.filter(c=>c!==cat)));
    subOv.remove();
    if(parentOv) parentOv.remove();
    buildCats(); render();
    showFeedback('"' + cat + '" eliminada', 'ok');
  };
}

applyDeletedCatalog();
buildCats();
setTimeout(updateCatsArrows,100);
render();
